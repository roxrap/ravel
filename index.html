<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ravel - Catálogo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="hero">
  <h1>Ravel</h1>
  <p>Pastas artesanales</p>
</header>

<main>

<section class="catalogo">
  <h2>Panzottis</h2>

  <div class="grid">

    <div class="card">
      <img src="images/panzotti-cordero.png">
      <div class="card-content">
        <h3>Cordero braseado</h3>
        <p>Pasta rellena de cocción lenta</p>
        <p class="porcion">🍽️ 8-10 por persona</p>
      </div>
    </div>

    <div class="card">
      <img src="images/panzotti-vacio.png">
      <div class="card-content">
        <h3>Vacío al Malbec</h3>
        <p>Sabor intenso y argentino</p>
        <p class="porcion">🍽️ 8-10 por persona</p>
      </div>
    </div>

  </div>
</section>

<section class="catalogo">
  <h2>Sorrentinos</h2>

  <div class="grid">

    <div class="card">
      <img src="images/sorrentino-jamon.png">
      <div class="card-content">
        <h3>Jamón crudo y rúcula</h3>
        <p>Clásico gourmet</p>
        <p class="porcion">🍽️ 6-8 por persona</p>
      </div>
    </div>

  </div>
</section>

</main>

</body>
</html>
